name: Bug report
description: Report a defect with enough detail to reproduce and triage it.
title: "bug: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. Please include concrete reproduction details so we can move from report to fix quickly.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What is broken and why does it matter?
      placeholder: A short summary of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps, payloads, and clicks needed to reproduce the problem.
      placeholder: |
        1. Open ...
        2. Submit ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include browser, OS, package/app version, and any relevant provider or deployment details.
      placeholder: "Chrome 136, Windows 11, local main branch, OpenAI provider"
    validations:
      required: true
  - type: input
    id: sentry
    attributes:
      label: Related Sentry issue URL
      description: Link the corresponding Sentry issue, trace, or replay when available.
      placeholder: "https://sentry.io/issues/..."
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recordings
      description: Paste screenshots, GIFs, or short notes about attached media.
      placeholder: Drag images into the issue body after submitting, or link them here.
