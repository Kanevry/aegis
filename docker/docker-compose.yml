name: aegis-openclaw

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegis}
      POSTGRES_USER: ${POSTGRES_USER:-aegis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aegis}
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-aegis} -d ${POSTGRES_DB:-aegis}
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${AEGIS_POSTGRES_PORT:-54329}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

  aegis-web:
    depends_on:
      postgres:
        condition: service_healthy
    build:
      context: ..
      dockerfile: docker/Dockerfile.aegis
      args:
        AEGIS_BUILD_PROFILE: ${AEGIS_BUILD_PROFILE:-dev}
    image: aegis-web:local
    environment:
      NODE_ENV: production
      PORT: "3000"
      SKIP_ENV_VALIDATION: ${SKIP_ENV_VALIDATION:-false}
      AEGIS_SHARED_TOKEN: ${AEGIS_SHARED_TOKEN}
      AEGIS_WEB_BASE_URL: ${AEGIS_WEB_BASE_URL:-http://localhost:3000}
      AEGIS_EXPECTED_OPENCLAW_GATEWAY_URL: http://openclaw-gateway:${OPENCLAW_GATEWAY_PORT:-18789}
      AEGIS_EXPECTED_OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_BASE_URL: http://openclaw-gateway:${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_API_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      DATABASE_URL: ${DATABASE_URL:-postgres://aegis:aegis@postgres:5432/aegis}
      PGBOSS_SCHEMA: ${PGBOSS_SCHEMA:-pgboss}
      AEGIS_SESSION_SECRET: ${AEGIS_SESSION_SECRET:-}
      AEGIS_SESSION_PASSPHRASE_HASH: ${AEGIS_SESSION_PASSPHRASE_HASH:-}
    ports:
      - "3000:3000"

  aegis-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    image: aegis-worker:local
    environment:
      NODE_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_URL: ${DATABASE_URL:-postgres://aegis:aegis@postgres:5432/aegis}
      PGBOSS_SCHEMA: ${PGBOSS_SCHEMA:-pgboss}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy

  openclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile.openclaw
    image: aegis-openclaw-gateway:local
    depends_on:
      - aegis-web
    environment:
      OPENCLAW_GATEWAY_PORT: ${OPENCLAW_GATEWAY_PORT:-18789}
      OPENCLAW_GATEWAY_TOKEN: ${OPENCLAW_GATEWAY_TOKEN}
      OPENCLAW_AGENT_ID: ${OPENCLAW_AGENT_ID:-main}
      OPENCLAW_AGENT_DIR: /var/lib/openclaw/state/agents/${OPENCLAW_AGENT_ID:-main}/agent
      OPENCLAW_AUTH_SEED_DIR: /opt/openclaw-auth-seed
      OPENCLAW_MODEL_REF: ${OPENCLAW_MODEL_REF:-openai-codex/gpt-5.4}
      AEGIS_BASE_URL: http://aegis-web:3000
      AEGIS_HEALTH_PATH: /api/runtime/openclaw/health
      AEGIS_SHARED_TOKEN: ${AEGIS_SHARED_TOKEN}
      OPENCLAW_AEGIS_BRIDGE_ENABLED: "1"
      OPENCLAW_AEGIS_APPROVAL_REQUEST_PATH: /api/runtime/openclaw/approval-requests
      OPENCLAW_AEGIS_DECISION_REQUEST_PATH: /api/runtime/openclaw/approval-requests/{approvalId}/decisions
      OPENCLAW_AEGIS_VERIFY_TLS: "0"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:18789"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    tmpfs:
      - /tmp
    volumes:
      - ./openclaw-auth-seed:/opt/openclaw-auth-seed:ro
      - openclaw-state:/var/lib/openclaw/state

volumes:
  openclaw-state:
  postgres-data:
